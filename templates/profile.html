<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: #1e3c72;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        .profile-info {
            margin-bottom: 20px;
        }
        .info-row {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        .info-label {
            font-weight: 500;
            color: #666;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 18px;
            color: #333;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #1e3c72;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <div>
                    <h1>Профиль пользователя</h1>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar">
                    {{ user.full_name[0] }}
                </div>
                <h2>{{ user.full_name }}</h2>
            </div>

            <div class="profile-info">
                <div class="info-row">
                    <div class="info-label">Имя пользователя</div>
                    <div class="info-value">{{ user.username }}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Email</div>
                    <div class="info-value">{{ user.email }}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">ID пользователя</div>
                    <div class="info-value">{{ user.user_id }}</div>
                </div>
            </div>

            <a href="{{ url_for('admin_panel') }}" class="back-link">← Вернуться в панель администратора</a>
        </div>
    </main>
</body>
</html>
